name: Daily Special Days Email

on:
  schedule:
    # 08:00 UTC = 10:00 Madrid (verano) / 09:00 Madrid (invierno).
    # GitHub Actions cron es siempre UTC y no sigue DST — aceptamos la deriva.
    - cron: '0 8 * * *'
  workflow_dispatch:  # permite disparar manualmente desde la pestaña Actions

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agente_email/requirements.txt

      - name: Install dependencies
        run: pip install -r agente_email/requirements.txt

      - name: Run agent
        working-directory: agente_email
        env:
          AZURE_ENDPOINT:   ${{ secrets.AZURE_ENDPOINT }}
          AZURE_API_KEY:    ${{ secrets.AZURE_API_KEY }}
          AZURE_DEPLOYMENT: ${{ secrets.AZURE_DEPLOYMENT }}
          TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:  ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER:      ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          USER_EMAILS:      ${{ secrets.USER_EMAILS }}
          USER_NAME:        ${{ secrets.USER_NAME }}
        run: python run.py --now
